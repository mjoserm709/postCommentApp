<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" routerLink="/" (click)="closeMobileMenu()">postCommentApp</a>
    <button
      class="navbar-toggler"
      type="button"
      aria-controls="navbarNav"
      [attr.aria-expanded]="isMobileMenuOpen()"
      aria-label="Abrir menu"
      (click)="toggleMobileMenu()"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="navbar-collapse-shell" [class.is-open]="isMobileMenuOpen()">
      <div class="navbar-collapse" id="navbarNav" [class.is-open]="isMobileMenuOpen()">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              (click)="closeMobileMenu()"
            >
              Categorias
            </a>
          </li>

          @if (authService.canAccessAdmin()) {
            <li class="nav-item">
              <a class="nav-link" routerLink="/admin" routerLinkActive="active" (click)="closeMobileMenu()">Admin</a>
            </li>

            @for (section of authService.getAdminSections(); track section.route) {
              <li class="nav-item">
                <a class="nav-link" [routerLink]="section.route" routerLinkActive="active" (click)="closeMobileMenu()">{{ section.label }}</a>
              </li>
            }
          }
        </ul>

        <ul class="navbar-nav">
          @if (authService.isAuthenticated()) {
            <li class="nav-item">
              <button type="button" class="btn btn-link nav-link" (click)="closeMobileMenu(); authService.logout()">
                Cerrar sesion
              </button>
            </li>
          } @else {
            <li class="nav-item">
              <a class="nav-link" routerLink="/auth/login" routerLinkActive="active" (click)="closeMobileMenu()">Login</a>
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</nav>

<router-outlet></router-outlet>

<app-toast></app-toast>
